<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIMGO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>TIMGO</h1>
      <div id="status-bar">
        <span id="connection-status" class="disconnected">Connecting...</span>
        <button id="edit-btn">Edit</button>
        <button id="reset-btn">Reset</button>
      </div>
    </header>

    <div id="bingo-banner" class="hidden">TIMGO!</div>
    <div id="other-bingo-banner" class="hidden">Someone else got TIMGO!</div>

    <div id="board-container">
      <div id="board"></div>
    </div>
  </div>

  <!-- Edit phrases modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2>Edit Phrases</h2>
        <button id="modal-close" aria-label="Close">✕</button>
      </div>
      <p id="phrase-count-warning" class="hidden">Need at least 24 phrases to fill a board.</p>
      <div id="phrase-list"></div>
      <button id="add-phrase-btn">+ Add phrase</button>
      <div id="modal-footer">
        <button id="cancel-btn">Cancel</button>
        <button id="save-btn">Save &amp; Refresh Game</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
